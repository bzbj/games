<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中国VC投资模拟器 - 优化复刻版</title>
  <meta name="description" content="一个关于中国VC投资、周期、退出和运气的文字策略模拟器。">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ee;
      --surface: #ffffff;
      --surface-2: #f9faf7;
      --ink: #161616;
      --muted: #626a73;
      --line: #d9ddd6;
      --line-strong: #bdc5bc;
      --primary: #134e4a;
      --primary-strong: #0f3f3b;
      --blue: #2563eb;
      --green: #16835b;
      --amber: #b26a00;
      --red: #b42318;
      --violet: #6d28d9;
      --cash: #0f766e;
      --shadow: 0 16px 42px rgba(22, 22, 22, 0.09);
      --shadow-sm: 0 8px 22px rgba(22, 22, 22, 0.07);
      --radius: 8px;
      --focus: 0 0 0 3px rgba(37, 99, 235, 0.25);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(19, 78, 74, 0.08), transparent 320px),
        radial-gradient(circle at 10% 0%, rgba(178, 106, 0, 0.1), transparent 320px),
        var(--bg);
      font-size: 16px;
      line-height: 1.5;
    }

    button {
      font: inherit;
    }

    button:focus-visible,
    [tabindex]:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .page {
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0 0 8px;
    }

    .eyebrow svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: 0;
      max-width: 900px;
    }

    .subtitle {
      margin: 12px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 17px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .button {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 10px 14px;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      touch-action: manipulation;
    }

    .button:hover {
      background: var(--primary-strong);
      transform: translateY(-1px);
    }

    .button:active {
      transform: translateY(0);
    }

    .button.secondary {
      color: var(--ink);
      background: var(--surface);
      border-color: var(--line);
    }

    .button.secondary:hover {
      background: var(--surface-2);
      border-color: var(--line-strong);
    }

    .button svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      min-height: 94px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric-value {
      font-family: var(--mono);
      font-size: clamp(20px, 2vw, 28px);
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .metric-note {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .workspace {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 340px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .panel-header {
      min-height: 52px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(249, 250, 247, 0.84);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #e7f4ef;
      color: var(--primary);
      border: 1px solid rgba(19, 78, 74, 0.16);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .panel-body {
      padding: 16px;
    }

    .market-visual {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 250 / 136;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fbfcf8;
      margin-bottom: 16px;
    }

    .market-visual text {
      font-family: var(--mono);
      font-size: 10px;
      fill: #626a73;
    }

    .market-visual .axis {
      stroke: #d9ddd6;
      stroke-width: 1;
    }

    .market-visual .curve {
      fill: none;
      stroke: var(--primary);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .market-visual .curve-alt {
      fill: none;
      stroke: var(--amber);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 5 5;
    }

    .heat-list {
      display: grid;
      gap: 12px;
    }

    .heat-row {
      display: grid;
      grid-template-columns: 70px minmax(0, 1fr) 42px;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .bar-track {
      height: 9px;
      border-radius: 999px;
      background: #e8ebe5;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: var(--blue);
      transition: width 220ms ease;
    }

    .heat-row:nth-child(2n) .bar-fill {
      background: var(--green);
    }

    .heat-row:nth-child(3n) .bar-fill {
      background: var(--amber);
    }

    .heat-value {
      text-align: right;
      font-family: var(--mono);
      color: var(--muted);
    }

    .main-stage {
      min-height: 620px;
      display: flex;
      flex-direction: column;
    }

    .event {
      padding: clamp(18px, 3vw, 28px);
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(19, 78, 74, 0.08), transparent 55%),
        var(--surface);
    }

    .event-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .year-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-family: var(--mono);
      font-weight: 800;
    }

    .event h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.15;
      letter-spacing: 0;
      max-width: 840px;
    }

    .event-copy {
      margin: 16px 0 0;
      color: #333b42;
      font-size: 17px;
      max-width: 860px;
    }

    .choice-grid {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .choice {
      width: 100%;
      text-align: left;
      min-height: 118px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 10px;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      touch-action: manipulation;
    }

    .choice:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: var(--shadow);
    }

    .choice:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    .choice-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .choice-title {
      font-weight: 850;
      font-size: 17px;
      line-height: 1.3;
    }

    .choice-copy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .choice-impact {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .impact {
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
      white-space: nowrap;
    }

    .portfolio-list,
    .log-list {
      display: grid;
      gap: 10px;
    }

    .deal,
    .log-entry {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px;
    }

    .deal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .deal-name {
      font-weight: 800;
      line-height: 1.25;
    }

    .deal-sector {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .deal-mark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .deal-progress {
      height: 7px;
      border-radius: 999px;
      overflow: hidden;
      background: #e8ebe5;
    }

    .deal-progress span {
      display: block;
      height: 100%;
      width: 40%;
      background: var(--primary);
      border-radius: inherit;
    }

    .log-entry {
      font-size: 13px;
      color: #343b42;
    }

    .log-year {
      font-family: var(--mono);
      font-weight: 800;
      color: var(--primary);
      margin-right: 6px;
    }

    .empty {
      min-height: 96px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 16px;
      background: rgba(249, 250, 247, 0.72);
    }

    .ending {
      display: none;
      padding: clamp(18px, 3vw, 28px);
      background: var(--surface);
    }

    .ending.is-visible {
      display: block;
    }

    .ending h2 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: 0;
    }

    .ending p {
      margin: 0;
      color: #333b42;
      max-width: 880px;
      font-size: 17px;
    }

    .ending-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .ending-stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: var(--surface-2);
    }

    .ending-stat strong {
      display: block;
      font-family: var(--mono);
      font-size: 24px;
      margin-top: 4px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(420px, calc(100% - 36px));
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--ink);
      color: #fff;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      transform: translateY(120%);
      opacity: 0;
      transition: transform 200ms ease, opacity 200ms ease;
      z-index: 10;
    }

    .toast.is-visible {
      transform: translateY(0);
      opacity: 1;
    }

    .toast strong {
      display: block;
      margin-bottom: 4px;
    }

    .toast span {
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
    }

    @media (max-width: 1180px) {
      .status-strip {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .workspace {
        grid-template-columns: 250px minmax(0, 1fr);
      }

      .side-right {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 20px, 720px);
        padding-top: 16px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .status-strip,
      .workspace,
      .side-right,
      .ending-grid {
        grid-template-columns: 1fr;
      }

      .metric {
        min-height: 78px;
      }

      .main-stage {
        min-height: auto;
      }
    }

    @media (max-width: 520px) {
      .top-actions,
      .button {
        width: 100%;
      }

      .choice-top {
        display: grid;
      }

      .heat-row {
        grid-template-columns: 64px minmax(0, 1fr) 38px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <p class="eyebrow">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 19V5m0 14h16M8 16l3-4 3 2 5-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Investment Committee Simulator
        </p>
        <h1>中国VC投资模拟器</h1>
        <p class="subtitle">从 2005 到 2025，作为风念资本投资人经历中国创投二十年。看项目、做选择、等退出，也管理自己的声誉、人脉和健康。</p>
      </div>
      <div class="top-actions">
        <button class="button secondary" type="button" id="howToPlay">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 17h.01M9.1 9a3 3 0 1 1 4.8 2.4c-.9.6-1.4 1.2-1.4 2.1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
          玩法
        </button>
        <button class="button" type="button" id="restartTop">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7M3 4v6h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          重开基金
        </button>
      </div>
    </header>

    <section class="status-strip" aria-label="基金状态">
      <article class="metric">
        <span class="metric-label">AUM</span>
        <span class="metric-value" id="cashMetric">100</span>
        <span class="metric-note">基金管理资产规模</span>
      </article>
      <article class="metric">
        <span class="metric-label">待退出项目</span>
        <span class="metric-value" id="navMetric">0</span>
        <span class="metric-note">仍在运作中的投资</span>
      </article>
      <article class="metric">
        <span class="metric-label">阶段</span>
        <span class="metric-value" id="dpiMetric">0.00x</span>
        <span class="metric-note">投资经理 / 合伙人</span>
      </article>
      <article class="metric">
        <span class="metric-label">投资业绩</span>
        <span class="metric-value" id="lpMetric">55</span>
        <span class="metric-note">业绩与行业声誉</span>
      </article>
      <article class="metric">
        <span class="metric-label">人脉网络</span>
        <span class="metric-value" id="repMetric">50</span>
        <span class="metric-note">项目来源质量</span>
      </article>
      <article class="metric">
        <span class="metric-label">健康</span>
        <span class="metric-value" id="disciplineMetric">48</span>
        <span class="metric-note">身心状态与续航</span>
      </article>
    </section>

    <section class="workspace" aria-label="游戏工作台">
      <aside class="panel side-left">
        <div class="panel-header">
          <h2 class="panel-title">职业状态</h2>
          <span class="tag" id="cycleTag">上行周期</span>
        </div>
        <div class="panel-body">
          <svg class="market-visual" viewBox="0 0 250 136" role="img" aria-label="资本市场周期示意图">
            <line class="axis" x1="20" y1="108" x2="232" y2="108"/>
            <line class="axis" x1="20" y1="24" x2="20" y2="108"/>
            <path class="curve-alt" d="M24 88 C58 72, 66 42, 98 46 S142 96, 178 62 S210 44, 230 34"/>
            <path class="curve" id="cycleCurve" d="M24 90 C56 84, 76 62, 98 58 S140 48, 166 56 S206 78, 230 66"/>
            <circle id="cycleDot" cx="24" cy="90" r="5" fill="#134e4a"/>
            <text x="18" y="124">2005</text>
            <text x="210" y="124">2025</text>
            <text x="28" y="22">热度</text>
          </svg>
          <div class="heat-list" id="heatList"></div>
        </div>
      </aside>

      <section class="panel main-stage">
        <div class="event" id="eventPane">
          <div class="event-meta">
            <span class="year-pill" id="yearPill">2005</span>
            <span class="tag" id="phaseTag">基金成立</span>
          </div>
          <h2 id="eventTitle"></h2>
          <p class="event-copy" id="eventCopy"></p>
        </div>
        <div class="choice-grid" id="choiceGrid"></div>
        <div class="ending" id="endingPane" aria-live="polite">
          <h2 id="endingTitle"></h2>
          <p id="endingCopy"></p>
          <div class="ending-grid" id="endingStats"></div>
          <div class="top-actions" style="justify-content:flex-start;margin-top:18px">
            <button class="button" type="button" id="restartEnding">再开一期基金</button>
          </div>
        </div>
      </section>

      <aside class="side-right">
        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">Portfolio</h2>
            <span class="tag" id="portfolioCount">0 家</span>
          </div>
          <div class="panel-body">
            <div class="portfolio-list" id="portfolioList"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">过程记录</h2>
            <span class="tag" id="logCount">0 条</span>
          </div>
          <div class="panel-body">
            <div class="log-list" id="logList"></div>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
var te = e => {
        let t = C(e),
            n = e => ee(t, e);
        return Object.assign(n, t), n
    },
    ne = (e => e ? te(e) : te),
    re = 2005,
    ie = {
        aum: 50,
        trackRecord: 5,
        network: 10,
        health: 80
    },
    ae = [{
        id: `era_pc_internet`,
        name: `PC互联网时代`,

    els.eventTitle.textContent = '二十年回顾';
    els.eventCopy.textContent = '每一次出手，都是一个时代的注脚。';
    els.endingTitle.textContent = `结局：${ending.title}`;
    els.endingCopy.textContent = ending.description;
    els.endingStats.innerHTML = [['AUM', fmt(game.aum)], ['投资业绩', fmt(game.trackRecord)], ['人脉网络', fmt(game.network)], ['健康', fmt(game.health)], ['投资项目', `${game.investmentHistory.length} 个`], ['职业阶段', stageLabel()]].map(([label, value]) => `<div class="ending-stat"><span class="metric-label">${label}</span><strong>${value}</strong></div>`).join('');
  }

  function showToast(title, body) {
    window.clearTimeout(toastTimer);
    els.toast.innerHTML = `<strong>${title}</strong><span>${body}</span>`;
    els.toast.classList.add('is-visible');
    toastTimer = window.setTimeout(() => els.toast.classList.remove('is-visible'), 3200);
  }

  document.getElementById('restartTop').addEventListener('click', initGame);
  document.getElementById('restartEnding').addEventListener('click', initGame);
  document.getElementById('howToPlay').addEventListener('click', () => showToast('玩法说明', '每年先处理行业/职业事件，再选择项目投资。投资项目会在多年后退出，影响 AUM、业绩、人脉和健康。'));
  initGame();
})();
  </script>
</body>
</html>
