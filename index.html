<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中国VC投资模拟器 - 优化复刻版</title>
  <meta name="description" content="一个关于中国VC投资、周期、退出和运气的文字策略模拟器。">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ee;
      --surface: #ffffff;
      --surface-2: #f9faf7;
      --ink: #161616;
      --muted: #626a73;
      --line: #d9ddd6;
      --line-strong: #bdc5bc;
      --primary: #134e4a;
      --primary-strong: #0f3f3b;
      --blue: #2563eb;
      --green: #16835b;
      --amber: #b26a00;
      --red: #b42318;
      --violet: #6d28d9;
      --cash: #0f766e;
      --shadow: 0 16px 42px rgba(22, 22, 22, 0.09);
      --shadow-sm: 0 8px 22px rgba(22, 22, 22, 0.07);
      --radius: 8px;
      --focus: 0 0 0 3px rgba(37, 99, 235, 0.25);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(19, 78, 74, 0.08), transparent 320px),
        radial-gradient(circle at 10% 0%, rgba(178, 106, 0, 0.1), transparent 320px),
        var(--bg);
      font-size: 16px;
      line-height: 1.5;
    }

    button {
      font: inherit;
    }

    button:focus-visible,
    [tabindex]:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .page {
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0 0 8px;
    }

    .eyebrow svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: 0;
      max-width: 900px;
    }

    .subtitle {
      margin: 12px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 17px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .button {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 10px 14px;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      touch-action: manipulation;
    }

    .button:hover {
      background: var(--primary-strong);
      transform: translateY(-1px);
    }

    .button:active {
      transform: translateY(0);
    }

    .button.secondary {
      color: var(--ink);
      background: var(--surface);
      border-color: var(--line);
    }

    .button.secondary:hover {
      background: var(--surface-2);
      border-color: var(--line-strong);
    }

    .button svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      min-height: 94px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric-value {
      font-family: var(--mono);
      font-size: clamp(20px, 2vw, 28px);
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .metric-note {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .workspace {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 340px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .panel-header {
      min-height: 52px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(249, 250, 247, 0.84);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #e7f4ef;
      color: var(--primary);
      border: 1px solid rgba(19, 78, 74, 0.16);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .panel-body {
      padding: 16px;
    }

    .market-visual {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 250 / 136;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fbfcf8;
      margin-bottom: 16px;
    }

    .market-visual text {
      font-family: var(--mono);
      font-size: 10px;
      fill: #626a73;
    }

    .market-visual .axis {
      stroke: #d9ddd6;
      stroke-width: 1;
    }

    .market-visual .curve {
      fill: none;
      stroke: var(--primary);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .market-visual .curve-alt {
      fill: none;
      stroke: var(--amber);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 5 5;
    }

    .heat-list {
      display: grid;
      gap: 12px;
    }

    .heat-row {
      display: grid;
      grid-template-columns: 70px minmax(0, 1fr) 42px;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .bar-track {
      height: 9px;
      border-radius: 999px;
      background: #e8ebe5;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: var(--blue);
      transition: width 220ms ease;
    }

    .heat-row:nth-child(2n) .bar-fill {
      background: var(--green);
    }

    .heat-row:nth-child(3n) .bar-fill {
      background: var(--amber);
    }

    .heat-value {
      text-align: right;
      font-family: var(--mono);
      color: var(--muted);
    }

    .main-stage {
      min-height: 620px;
      display: flex;
      flex-direction: column;
    }

    .event {
      padding: clamp(18px, 3vw, 28px);
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(19, 78, 74, 0.08), transparent 55%),
        var(--surface);
    }

    .event-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .year-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-family: var(--mono);
      font-weight: 800;
    }

    .event h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.15;
      letter-spacing: 0;
      max-width: 840px;
    }

    .event-copy {
      margin: 16px 0 0;
      color: #333b42;
      font-size: 17px;
      max-width: 860px;
    }

    .choice-grid {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .choice {
      width: 100%;
      text-align: left;
      min-height: 118px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 10px;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      touch-action: manipulation;
    }

    .choice:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: var(--shadow);
    }

    .choice:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    .choice-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .choice-title {
      font-weight: 850;
      font-size: 17px;
      line-height: 1.3;
    }

    .choice-copy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .choice-impact {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .impact {
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
      white-space: nowrap;
    }

    .portfolio-list,
    .log-list {
      display: grid;
      gap: 10px;
    }

    .deal,
    .log-entry {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px;
    }

    .deal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .deal-name {
      font-weight: 800;
      line-height: 1.25;
    }

    .deal-sector {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .deal-mark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .deal-progress {
      height: 7px;
      border-radius: 999px;
      overflow: hidden;
      background: #e8ebe5;
    }

    .deal-progress span {
      display: block;
      height: 100%;
      width: 40%;
      background: var(--primary);
      border-radius: inherit;
    }

    .log-entry {
      font-size: 13px;
      color: #343b42;
    }

    .log-year {
      font-family: var(--mono);
      font-weight: 800;
      color: var(--primary);
      margin-right: 6px;
    }

    .empty {
      min-height: 96px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 16px;
      background: rgba(249, 250, 247, 0.72);
    }

    .ending {
      display: none;
      padding: clamp(18px, 3vw, 28px);
      background: var(--surface);
    }

    .ending.is-visible {
      display: block;
    }

    .ending h2 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: 0;
    }

    .ending p {
      margin: 0;
      color: #333b42;
      max-width: 880px;
      font-size: 17px;
    }

    .ending-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .ending-stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: var(--surface-2);
    }

    .ending-stat strong {
      display: block;
      font-family: var(--mono);
      font-size: 24px;
      margin-top: 4px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(420px, calc(100% - 36px));
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--ink);
      color: #fff;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      transform: translateY(120%);
      opacity: 0;
      transition: transform 200ms ease, opacity 200ms ease;
      z-index: 10;
    }

    .toast.is-visible {
      transform: translateY(0);
      opacity: 1;
    }

    .toast strong {
      display: block;
      margin-bottom: 4px;
    }

    .toast span {
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
    }

    @media (max-width: 1180px) {
      .status-strip {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .workspace {
        grid-template-columns: 250px minmax(0, 1fr);
      }

      .side-right {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 20px, 720px);
        padding-top: 16px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .status-strip,
      .workspace,
      .side-right,
      .ending-grid {
        grid-template-columns: 1fr;
      }

      .metric {
        min-height: 78px;
      }

      .main-stage {
        min-height: auto;
      }
    }

    @media (max-width: 520px) {
      .top-actions,
      .button {
        width: 100%;
      }

      .choice-top {
        display: grid;
      }

      .heat-row {
        grid-template-columns: 64px minmax(0, 1fr) 38px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <p class="eyebrow">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 19V5m0 14h16M8 16l3-4 3 2 5-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Investment Committee Simulator
        </p>
        <h1>中国VC投资模拟器</h1>
        <p class="subtitle">从 2005 年开始，在项目投资、行业事件、人脉和健康之间做选择。</p>
      </div>
      <div class="top-actions">
        <button class="button secondary" type="button" id="howToPlay">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 17h.01M9.1 9a3 3 0 1 1 4.8 2.4c-.9.6-1.4 1.2-1.4 2.1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
          玩法
        </button>
        <button class="button" type="button" id="restartTop">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7M3 4v6h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          重开基金
        </button>
      </div>
    </header>

    <section class="status-strip" aria-label="基金状态">
      <article class="metric">
        <span class="metric-label">AUM</span>
        <span class="metric-value" id="cashMetric">100</span>
        <span class="metric-note">基金管理资产规模</span>
      </article>
      <article class="metric">
        <span class="metric-label">待退出项目</span>
        <span class="metric-value" id="navMetric">0</span>
        <span class="metric-note">仍在运作中的投资</span>
      </article>
      <article class="metric">
        <span class="metric-label">阶段</span>
        <span class="metric-value" id="dpiMetric">0.00x</span>
        <span class="metric-note">投资经理 / 合伙人</span>
      </article>
      <article class="metric">
        <span class="metric-label">投资业绩</span>
        <span class="metric-value" id="lpMetric">55</span>
        <span class="metric-note">业绩与行业声誉</span>
      </article>
      <article class="metric">
        <span class="metric-label">人脉网络</span>
        <span class="metric-value" id="repMetric">50</span>
        <span class="metric-note">项目来源质量</span>
      </article>
      <article class="metric">
        <span class="metric-label">健康</span>
        <span class="metric-value" id="disciplineMetric">48</span>
        <span class="metric-note">身心状态与续航</span>
      </article>
    </section>

    <section class="workspace" aria-label="游戏工作台">
      <aside class="panel side-left">
        <div class="panel-header">
          <h2 class="panel-title">职业状态</h2>
          <span class="tag" id="cycleTag">上行周期</span>
        </div>
        <div class="panel-body">
          <svg class="market-visual" viewBox="0 0 250 136" role="img" aria-label="资本市场周期示意图">
            <line class="axis" x1="20" y1="108" x2="232" y2="108"/>
            <line class="axis" x1="20" y1="24" x2="20" y2="108"/>
            <path class="curve-alt" d="M24 88 C58 72, 66 42, 98 46 S142 96, 178 62 S210 44, 230 34"/>
            <path class="curve" id="cycleCurve" d="M24 90 C56 84, 76 62, 98 58 S140 48, 166 56 S206 78, 230 66"/>
            <circle id="cycleDot" cx="24" cy="90" r="5" fill="#134e4a"/>
            <text x="18" y="124">2014</text>
            <text x="210" y="124">2026</text>
            <text x="28" y="22">热度</text>
          </svg>
          <div class="heat-list" id="heatList"></div>
        </div>
      </aside>

      <section class="panel main-stage">
        <div class="event" id="eventPane">
          <div class="event-meta">
            <span class="year-pill" id="yearPill">2014</span>
            <span class="tag" id="phaseTag">基金成立</span>
          </div>
          <h2 id="eventTitle"></h2>
          <p class="event-copy" id="eventCopy"></p>
        </div>
        <div class="choice-grid" id="choiceGrid"></div>
        <div class="ending" id="endingPane" aria-live="polite">
          <h2 id="endingTitle"></h2>
          <p id="endingCopy"></p>
          <div class="ending-grid" id="endingStats"></div>
          <div class="top-actions" style="justify-content:flex-start;margin-top:18px">
            <button class="button" type="button" id="restartEnding">再开一期基金</button>
          </div>
        </div>
      </section>

      <aside class="side-right">
        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">Portfolio</h2>
            <span class="tag" id="portfolioCount">0 家</span>
          </div>
          <div class="panel-body">
            <div class="portfolio-list" id="portfolioList"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">过程记录</h2>
            <span class="tag" id="logCount">0 条</span>
          </div>
          <div class="panel-body">
            <div class="log-list" id="logList"></div>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

    const nextTurn = turns[state.turn + 1];
    if (!nextTurn || nextTurn.year > turn.year) state.health = clamp(state.health - 1, 0, 100);
    if (state.aum < 5 && state.trackRecord < 40 && turn.year >= 2013) { finishGame('capital_orphan'); return; }
    state.turn += 1;
    if (state.turn >= turns.length) finishGame('complete'); else render();
  }
  function finishGame(reason) {
    state.ended = true; render(); els.choiceGrid.hidden = true; els.endingPane.classList.add('is-visible');
    if (reason === 'capital_orphan') { els.endingTitle.textContent = `结局：${endingText.title}`; els.endingCopy.textContent = endingText.copy; }
    else { els.endingTitle.textContent = '结局：幸存者'; els.endingCopy.textContent = '你走完了这条 reference 路线，没有被提前淘汰。虽然过程充满波动，但至少还留在牌桌上。'; }
    els.endingStats.innerHTML = [['AUM', fmt(state.aum)], ['投资业绩', fmt(state.trackRecord)], ['人脉网络', fmt(state.network)], ['健康', fmt(state.health)], ['投资项目', `${state.portfolio.length} 个`], ['完成回合', `${Math.min(state.turn + 1, turns.length)}/${turns.length}`]].map(([label, value]) => `<div class="ending-stat"><span class="metric-label">${label}</span><strong>${value}</strong></div>`).join('');
  }
  function render() {
    const turn = currentTurn(); const pending = state.portfolio.filter((item) => item.status === 'pending');
    els.cashMetric.textContent = fmt(state.aum); els.navMetric.textContent = String(pending.length); els.dpiMetric.textContent = state.careerStage; els.lpMetric.textContent = fmt(state.trackRecord); els.repMetric.textContent = fmt(state.network); els.disciplineMetric.textContent = fmt(state.health);
    renderProgress(); renderPortfolio(); renderLog(); if (!turn || state.ended) return;
    els.yearPill.textContent = turn.year; els.phaseTag.textContent = turn.type === 'event' ? '时代事件' : turn.type === 'invest' ? '投资选择' : '退出更新'; els.cycleTag.textContent = `${state.turn + 1}/${turns.length}`; els.eventTitle.textContent = turn.title; els.eventCopy.textContent = turn.copy; els.choiceGrid.hidden = false; els.endingPane.classList.remove('is-visible');
    els.choiceGrid.innerHTML = turn.options.map((option, index) => choiceMarkup(turn, option, index)).join('');
    els.choiceGrid.querySelectorAll('.choice').forEach((button) => button.addEventListener('click', () => applyChoice(Number(button.dataset.choice))));
  }
  function choiceMarkup(turn, option, index) {
    const isReference = index === turn.referenceChoice;
    if (turn.type === 'invest') {
      const impact = [`投入 -${option.amount}`, `成功率 ${Math.round(option.successBaseRate * 100)}%`, `潜在 ${option.potentialMultiplier}x`];
      return `<button class="choice" type="button" data-choice="${index}"><span class="choice-top"><span class="choice-title">${option.name}</span><span class="tag">${sectorNames[option.sector] || option.sector}</span></span><p class="choice-copy">${option.tagline}</p><p class="choice-copy">风险：${option.riskHint}</p><span class="choice-impact">${impact.map((item) => `<span class="impact">${item}</span>`).join('')}</span></button>`;
    }
    const changes = option.statChanges || {}; const impact = [`AUM ${signed(changes.aum || 0)}`, `业绩 ${signed(changes.trackRecord || 0)}`, `人脉 ${signed(changes.network || 0)}`, `健康 ${signed(changes.health || 0)}`];
    return `<button class="choice" type="button" data-choice="${index}"><span class="choice-top"><span class="choice-title">${option.text}</span><span class="tag">可选</span></span><p class="choice-copy">选择后立即影响职业状态。</p><span class="choice-impact">${impact.map((item) => `<span class="impact">${item}</span>`).join('')}</span></button>`;
  }
  function renderProgress() {
    const progress = turns.length <= 1 ? 0 : state.turn / (turns.length - 1);
    els.heatList.innerHTML = [['游戏进度', Math.round(progress * 100)], ['AUM', clamp(state.aum, 0, 100)], ['投资业绩', state.trackRecord], ['人脉网络', state.network], ['健康', state.health]].map(([label, value]) => `<div class="heat-row"><span>${label}</span><span class="bar-track" aria-hidden="true"><span class="bar-fill" style="width:${clamp(value, 0, 100)}%"></span></span><span class="heat-value">${fmt(value)}</span></div>`).join('');
    const x = 24 + progress * 206; const y = 90 - Math.sin(progress * Math.PI * 1.15) * 34 + progress * 8; els.cycleDot.setAttribute('cx', String(clamp(x, 24, 230))); els.cycleDot.setAttribute('cy', String(clamp(y, 28, 108)));
  }
  function renderPortfolio() {
    const pending = state.portfolio.filter((item) => item.status === 'pending'); els.portfolioCount.textContent = `${pending.length} 个`;
    if (!state.portfolio.length) { els.portfolioList.innerHTML = '<div class="empty">暂无投资。选择项目后会显示在这里。</div>'; return; }
    els.portfolioList.innerHTML = state.portfolio.slice().reverse().slice(0, 9).map((item) => { const width = clamp((Number(item.multiple) || 0) * 8, 6, 100); return `<article class="deal"><div class="deal-head"><div><div class="deal-name">${item.name}</div><div class="deal-sector">${sectorNames[item.sector] || item.sector} / ${item.year} 投 / ${item.maturityYear} 到期</div></div><div class="deal-mark">${item.status === 'resolved' ? '已退出' : '待退出'}</div></div><div class="deal-progress"><span style="width:${width}%"></span></div></article>`; }).join('');
  }
  function renderLog() {
    els.logCount.textContent = `${state.log.length} 条`; if (!state.log.length) { els.logList.innerHTML = '<div class="empty">选择和退出会记录在这里。</div>'; return; }
    els.logList.innerHTML = state.log.slice(0, 10).map((entry) => `<article class="log-entry"><span class="log-year">${entry.year}</span>${entry.text}</article>`).join('');
  }
  function resetGame() { state = initialState(); els.endingPane.classList.remove('is-visible'); showToast('重新开始', 'Reference 路线已重置。'); render(); }
  function showToast(title, body) { window.clearTimeout(toastTimer); els.toast.innerHTML = `<strong>${title}</strong><span>${body}</span>`; els.toast.classList.add('is-visible'); toastTimer = window.setTimeout(() => els.toast.classList.remove('is-visible'), 3200); }
  document.getElementById('restartTop').addEventListener('click', resetGame); document.getElementById('restartEnding').addEventListener('click', resetGame); document.getElementById('howToPlay').addEventListener('click', () => showToast('玩法说明', '每回合选择一个事件处理方式或投资项目。投资会占用 AUM，项目到期后才揭晓退出结果。'));
  render();
})();
  </script>
</body>
</html>
